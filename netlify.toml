# Deploy the SEO tier-list site (the static seo-site/ folder).
# This config is for the marketing/SEO site only — the Expo app deploys separately.
#
# 1. Push this repo to GitHub.
# 2. On netlify.com → "Add new site" → import this repo.
# 3. Site settings → Environment variables:
#      BASE_URL   = https://your-domain.com     (your final site URL)
#      AMAZON_TAG = yourtag-20                   (your Amazon Associates tag)
# 4. Deploy. Every push rebuilds all 238 pages + sitemap.

# Build BOTH outputs into seo-site/:
#  1. build-seo.mjs wipes + regenerates the static SEO pages at the root.
#  2. expo export emits the full interactive app into seo-site/app (served
#     at /app). Order matters — build-seo runs first because it clears seo-site/.
[build]
  # build-site.mjs runs the SEO build + app export + meta injection, and reuses a
  # cached `expo export` when nothing affecting the app bundle changed. The app
  # export is what burns build credits; most pushes don't need it.
  command = "node scripts/build-site.mjs"
  publish = "seo-site"

[build.environment]
  NODE_VERSION = "20"

# Bare domain opens the interactive app (the front door). force = true so the
# redirect beats the static index.html that also sits at the root. Individual
# SEO pages (/sneaker-brands) and the list hub (/lists) are unaffected —
# from = "/" matches only the exact root path, not sub-paths.
[[redirects]]
  from = "/"
  to = "/app"
  status = 301
  force = true

# SPA fallback for the app: any /app/* path that isn't a real file (deep links,
# refreshes on /app/premade/…) serves the app shell. Real assets under
# /app/_expo/ are served directly since force is off.
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# Pages are emitted as /<slug>/index.html, so Netlify serves clean URLs
# (/national-flags) natively — no rewrite needed. Redirect any old .html links.
[[redirects]]
  from = "/:slug.html"
  to = "/:slug"
  status = 301
  force = false
